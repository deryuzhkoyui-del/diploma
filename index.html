
<style>
*{box-sizing:border-box;margin:0;padding:0}
.page{padding:1.5rem;max-width:1000px;font-family:var(--font-sans)}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.header h1{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.count-badge{font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);padding:2px 8px;border-radius:10px;border:0.5px solid var(--color-border-tertiary)}
.search{font-size:13px;padding:6px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);width:220px;outline:none}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.filter-label{font-size:12px;color:var(--color-text-secondary);margin-right:4px}
.chip{font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer;user-select:none}
.chip.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
.toggle-archive{display:flex;align-items:center;gap:6px;margin-left:auto;cursor:pointer;user-select:none}
.toggle-archive span{font-size:12px;color:var(--color-text-secondary)}
.toggle-track{width:32px;height:18px;border-radius:9px;background:var(--color-border-secondary);position:relative;transition:background .2s;flex-shrink:0}
.toggle-track.on{background:#1D9E75}
.toggle-thumb{width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s}
.toggle-track.on .toggle-thumb{left:16px}
.table-wrap{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead tr{background:var(--color-background-secondary)}
th{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-align:left;padding:10px 16px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--color-text-primary)}
th .sort-icon{margin-left:4px;font-size:10px;opacity:.5}
th.sorted .sort-icon{opacity:1;color:var(--color-text-info)}
td{font-size:14px;padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle;color:var(--color-text-primary)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary)}
tr.archived td{opacity:.55}
tr.archived:hover td{background:var(--color-background-secondary)}
.proj-link{color:var(--color-text-info);text-decoration:none;font-weight:500;font-size:14px}
.proj-link:hover{text-decoration:underline}
.proj-desc{font-size:12px;color:var(--color-text-secondary);margin-top:3px}
.arch-badge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:8px;background:#F1EFE8;color:#5F5E5A;border:0.5px solid #D3D1C7;margin-left:6px;vertical-align:middle;font-weight:400}
.clickable{color:var(--color-text-primary);text-decoration:none;font-size:13px;cursor:pointer;border-bottom:0.5px dashed var(--color-border-secondary)}
.clickable:hover{color:var(--color-text-info);border-bottom-color:var(--color-border-info)}
.teacher-wrap{display:flex;flex-direction:column;gap:3px}
col.c1{width:28%}col.c2{width:16%}col.c3{width:18%}col.c4{width:16%}col.c5{width:22%}
.avg-val{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.avg-empty{font-size:13px;color:var(--color-text-secondary)}
.star-mini{font-size:13px;color:#EF9F27;margin-left:2px}
.star{font-size:18px;cursor:pointer;transition:transform .1s;color:#D3D1C7;line-height:1;user-select:none}
.star.filled{color:#EF9F27}
.star:hover{transform:scale(1.15)}
.stars.locked .star{cursor:default}
.stars.locked .star:hover{transform:none}
.locked-display{display:flex;align-items:center;gap:6px}
.locked-stars{display:flex;gap:2px}
.unlock-btn{font-size:11px;padding:2px 8px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;white-space:nowrap}
.unlock-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.edit-wrap{display:flex;align-items:center;gap:6px}
.confirm-btn{width:24px;height:24px;border-radius:50%;border:0.5px solid var(--color-border-success);background:transparent;color:var(--color-text-success);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.confirm-btn:hover{background:var(--color-background-success)}
.cancel-btn{width:24px;height:24px;border-radius:50%;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cancel-btn:hover{background:var(--color-background-secondary)}
.no-rating-hint{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.arch-only-rating{font-size:13px;color:var(--color-text-secondary)}
.pagination{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;padding:0 4px}
.pg-info{font-size:13px;color:var(--color-text-secondary)}
.pg-btns{display:flex;gap:4px}
.btn{font-size:12px;padding:5px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer}
.btn.cur{background:var(--color-background-secondary)}
.stars{display:flex;gap:2px}
</style>

<div class="page">
  <div class="header">
    <div style="display:flex;align-items:baseline;gap:12px">
      <h1>Проекты</h1>
      <span class="count-badge" id="count-badge">5 проектов</span>
    </div>
    <input class="search" type="text" placeholder="Поиск по проектам..." id="search-input"/>
  </div>

  <div class="toolbar">
    <span class="filter-label">Фильтр:</span>
    <span class="chip active" data-filter="all">Все</span>
    <span class="chip" data-filter="rated">Оценены</span>
    <span class="chip" data-filter="unrated">Без оценки</span>
    <span class="chip" data-filter="mine">Мои оценки</span>
    <label class="toggle-archive" id="arch-toggle">
      <div class="toggle-track" id="arch-track"><div class="toggle-thumb"></div></div>
      <span>Показать архивные</span>
    </label>
  </div>

  <div class="table-wrap">
    <table>
      <colgroup><col class="c1"/><col class="c2"/><col class="c3"/><col class="c4"/><col class="c5"/></colgroup>
      <thead>
        <tr>
          <th data-col="name">Название <span class="sort-icon">↕</span></th>
          <th data-col="team">Команда <span class="sort-icon">↕</span></th>
          <th data-col="teachers">Кураторы <span class="sort-icon">↕</span></th>
          <th data-col="avg" style="text-align:center">Средняя оценка <span class="sort-icon">↕</span></th>
          <th style="padding-left:20px">Моя оценка</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="pagination">
    <span class="pg-info" id="pg-info">Показано 1–5 из 7</span>
    <div class="pg-btns">
      <button class="btn">← Назад</button>
      <button class="btn cur">1</button>
      <button class="btn">2</button>
      <button class="btn">Вперёд →</button>
    </div>
  </div>
</div>

<script>
const projects = [
  {id:1,name:"Система умного полива",desc:"IoT-решение для автоматизации полива",team:"Green Tech Team",teachers:["проф. Иванов И.И.","доц. Смирнова А.В."],avgRating:4.2,myRating:4,archived:false,editing:false,tempRating:4},
  {id:2,name:"AI-ассистент для HR",desc:"Автоматизация первичного отбора кандидатов",team:"DataFlow",teachers:["проф. Орлов Б.С."],avgRating:3.8,myRating:null,archived:false,editing:false,tempRating:0},
  {id:3,name:"Маркетплейс запчастей",desc:"Платформа для автосервисов",team:"AutoParts Dev",teachers:["доц. Григорьев П.Н.","проф. Лебедева О.К."],avgRating:4.7,myRating:5,archived:false,editing:false,tempRating:5},
  {id:4,name:"Трекер ментального здоровья",desc:"Мобильное приложение для самонаблюдения",team:"MindPath",teachers:["проф. Соколова Е.В."],avgRating:null,myRating:null,archived:false,editing:false,tempRating:0},
  {id:5,name:"Цифровой архив документов",desc:"OCR + поиск для государственных архивов",team:"DocScan Lab",teachers:["доц. Чернов А.Д.","доц. Фролова М.В."],avgRating:3.5,myRating:null,archived:false,editing:false,tempRating:0},
  {id:6,name:"Виртуальный тьютор по математике",desc:"Адаптивная система обучения (2022)",team:"EduMath",teachers:["проф. Белов К.С."],avgRating:4.1,myRating:null,archived:true,editing:false,tempRating:0},
  {id:7,name:"Агрегатор новостей с NLP",desc:"Кластеризация и суммаризация новостей (2021)",team:"NewsParse",teachers:["доц. Ковалёва И.Р.","проф. Тихонов В.А."],avgRating:3.3,myRating:null,archived:true,editing:false,tempRating:0},
];

let showArchived=false;
let activeFilter='all';
let sortCol=null;
let sortDir=1;

function getVisible(){
  let list=projects.filter(p=>showArchived?true:!p.archived);
  if(activeFilter==='rated') list=list.filter(p=>p.avgRating!==null);
  if(activeFilter==='unrated') list=list.filter(p=>p.avgRating===null&&!p.archived);
  if(activeFilter==='mine') list=list.filter(p=>p.myRating!==null);
  const q=document.getElementById('search-input').value.toLowerCase();
  if(q) list=list.filter(p=>p.name.toLowerCase().includes(q)||p.team.toLowerCase().includes(q)||p.teachers.join(' ').toLowerCase().includes(q));
  if(sortCol){
    list=[...list].sort((a,b)=>{
      let av,bv;
      if(sortCol==='name'){av=a.name;bv=b.name;}
      else if(sortCol==='team'){av=a.team;bv=b.team;}
      else if(sortCol==='teachers'){av=a.teachers[0]||'';bv=b.teachers[0]||'';}
      else if(sortCol==='avg'){av=a.avgRating??-1;bv=b.avgRating??-1;}
      if(typeof av==='string') return av.localeCompare(bv,'ru')*sortDir;
      return (av-bv)*sortDir;
    });
  }
  return list;
}

function starsStaticHtml(filled){
  let h='';
  for(let i=1;i<=5;i++) h+=`<span class="star${i<=filled?' filled':''}" style="cursor:default;font-size:15px">${i<=filled?'★':'☆'}</span>`;
  return h;
}

function avgCell(p){
  if(p.avgRating===null) return `<td style="text-align:center"><span class="avg-empty">—</span></td>`;
  return `<td style="text-align:center"><span class="avg-val">${p.avgRating.toFixed(1)}</span><span class="star-mini">★</span></td>`;
}

function myRatingCell(p){
  if(p.archived){
    return `<td style="padding-left:20px"><span class="arch-only-rating" style="font-size:12px;color:var(--color-text-secondary)">—</span></td>`;
  }
  if(p.editing){
    const t=p.tempRating||0;
    let starsH='';
    for(let i=1;i<=5;i++) starsH+=`<span class="star${i<=t?' filled':''}" data-pid="${p.id}" data-val="${i}">${i<=t?'★':'☆'}</span>`;
    return `<td style="padding-left:20px">
      <div class="edit-wrap">
        <div class="stars" data-editpid="${p.id}">${starsH}</div>
        <button class="confirm-btn" data-confirm="${p.id}">✓</button>
        <button class="cancel-btn" data-cancel="${p.id}">✕</button>
      </div>
      ${p.myRating?`<div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px">было: ${p.myRating} ★</div>`:''}
    </td>`;
  }
  if(p.myRating!==null){
    return `<td style="padding-left:20px">
      <div class="locked-display">
        <div class="locked-stars">${starsStaticHtml(p.myRating)}</div>
        <button class="unlock-btn" data-unlock="${p.id}">✎</button>
      </div>
    </td>`;
  }
  let starsH='';
  for(let i=1;i<=5;i++) starsH+=`<span class="star" data-pid="${p.id}" data-val="${i}">☆</span>`;
  return `<td style="padding-left:20px">
    <div class="stars" data-newpid="${p.id}">${starsH}</div>
    <div class="no-rating-hint">нажмите, чтобы оценить</div>
  </td>`;
}

function renderRow(p){
  const teachersHtml=p.teachers.map(t=>`<a class="clickable" href="#">${t}</a>`).join('');
  return `<tr${p.archived?' class="archived"':''}>
    <td><a class="proj-link" href="#">${p.name}</a>${p.archived?'<span class="arch-badge">архив</span>':''}<div class="proj-desc">${p.desc}</div></td>
    <td><a class="clickable" href="#">${p.team}</a></td>
    <td><div class="teacher-wrap">${teachersHtml}</div></td>
    ${avgCell(p)}
    ${myRatingCell(p)}
  </tr>`;
}

function render(){
  const visible=getVisible();
  document.getElementById('tbody').innerHTML=visible.map(renderRow).join('');
  const active=projects.filter(p=>!p.archived).length;
  const archCount=projects.filter(p=>p.archived).length;
  document.getElementById('count-badge').textContent=showArchived?`${projects.length} проектов (${archCount} архив.)`:`${active} проектов`;
  document.getElementById('pg-info').textContent=`Показано 1–${visible.length} из ${visible.length}`;
  // update sort icons
  document.querySelectorAll('th[data-col]').forEach(th=>{
    const col=th.dataset.col;
    th.classList.toggle('sorted',col===sortCol);
    const ic=th.querySelector('.sort-icon');
    if(col===sortCol) ic.textContent=sortDir===1?'↑':'↓';
    else ic.textContent='↕';
  });
  bindEvents();
}

function bindEvents(){
  document.querySelectorAll('.stars[data-editpid] .star, .stars[data-newpid] .star').forEach(star=>{
    const val=+star.dataset.val,pid=+star.dataset.pid;
    star.addEventListener('mouseenter',()=>{
      star.closest('.stars').querySelectorAll('.star').forEach(s=>{
        const sv=+s.dataset.val;s.textContent=sv<=val?'★':'☆';s.style.color=sv<=val?'#EF9F27':'';
      });
    });
    star.addEventListener('mouseleave',()=>{
      const p=projects.find(x=>x.id===pid);
      const cur=p.editing?(p.tempRating||0):0;
      star.closest('.stars').querySelectorAll('.star').forEach(s=>{
        const sv=+s.dataset.val;s.textContent=sv<=cur?'★':'☆';s.style.color=sv<=cur?'#EF9F27':'';
      });
    });
    star.addEventListener('click',()=>{
      const p=projects.find(x=>x.id===pid);
      if(p.editing){p.tempRating=val;render();}
      else{p.myRating=val;p.avgRating=p.avgRating?+((p.avgRating*4+val)/5).toFixed(1):val;render();}
    });
  });
  document.querySelectorAll('[data-unlock]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const p=projects.find(x=>x.id===+btn.dataset.unlock);
      p.editing=true;p.tempRating=p.myRating;render();
    });
  });
  document.querySelectorAll('[data-confirm]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const p=projects.find(x=>x.id===+btn.dataset.confirm);
      if(!p.tempRating)return;
      if(p.myRating!==null&&p.avgRating!==null) p.avgRating=+(((p.avgRating*5)-p.myRating+p.tempRating)/5).toFixed(1);
      else if(p.avgRating===null) p.avgRating=p.tempRating;
      p.myRating=p.tempRating;p.editing=false;render();
    });
  });
  document.querySelectorAll('[data-cancel]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const p=projects.find(x=>x.id===+btn.dataset.cancel);
      p.editing=false;render();
    });
  });
}

// toolbar filters
document.querySelectorAll('.chip[data-filter]').forEach(chip=>{
  chip.addEventListener('click',()=>{
    activeFilter=chip.dataset.filter;
    document.querySelectorAll('.chip[data-filter]').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    render();
  });
});

// archive toggle
document.getElementById('arch-toggle').addEventListener('click',()=>{
  showArchived=!showArchived;
  const track=document.getElementById('arch-track');
  track.classList.toggle('on',showArchived);
  render();
});

// sort headers
document.querySelectorAll('th[data-col]').forEach(th=>{
  th.addEventListener('click',()=>{
    const col=th.dataset.col;
    if(sortCol===col){sortDir*=-1;}else{sortCol=col;sortDir=1;}
    render();
  });
});

// search
document.getElementById('search-input').addEventListener('input',render);

render();
</script>
